theme = "PaperMod"

enableRobotsTXT = true

[pagination]
pagerSize = 10

[params]
author = "Johan Basson"
description = "Senior Backend Software Engineer specialising in Kotlin, Java and Functional Programming."

defaultTheme = "dark"
